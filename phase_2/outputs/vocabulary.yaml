normalization_notes:
- C1 should map framework-specific raw names to canonical action_name labels before
  deriving effect_type and target_resource.
- For example, sendEmail, gmail_send, email.send, and mcp.gmail.send should normalize
  to send_email.
- If a raw value cannot be mapped with confidence, use unknown for enum fields and
  preserve the original value in metadata/raw_event_ref.
- Vocabulary validation is intentionally separate from C2 rule completeness. Missing
  evidence should lead to UNKNOWN in C2, not schema rejection.
